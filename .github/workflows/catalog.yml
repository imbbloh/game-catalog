name: Build catalog JSON

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/build-catalog.js']

permissions:
  contents: write

concurrency:
  group: catalog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build games.json from the Google Sheet
        run: node scripts/build-catalog.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games.json
          # games.json is generated, so never merge it: if the push races
          # with another run, reset to the remote and regenerate instead.
          for i in 1 2 3; do
            git add games.json
            if git diff --cached --quiet; then
              echo "games.json unchanged — nothing to commit"
              break
            fi
            git commit -m "Update games.json snapshot"
            if git push; then break; fi
            echo "push rejected — resetting to origin and regenerating ($i/3)"
            git fetch origin main
            git reset --hard origin/main
            node scripts/build-catalog.js
          done
