name: Build catalog JSON

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/build-catalog.js']

permissions:
  contents: write

concurrency:
  group: catalog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build games.json from the Google Sheet
        run: node scripts/build-catalog.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games.json
          if git diff --cached --quiet; then
            echo "games.json unchanged — nothing to commit"
          else
            git commit -m "Update games.json snapshot"
            for i in 1 2 3; do
              if git push; then break; fi
              echo "push rejected — rebasing and retrying ($i/3)"
              git pull --rebase origin main
            done
          fi
