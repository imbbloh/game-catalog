name: Build Carousell URLs

on:
  schedule:
    - cron: '30 18 * * *'   # daily 02:30 GMT+8 — rematch new sheet rows
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Skip the browser scrape and reuse the committed carousell-listings.json'
        type: boolean
        default: false
  push:
    branches: [main]
    paths: ['carousell-listings.json']   # rematch whenever fresh listings land

permissions:
  contents: write

concurrency:
  group: carousell
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Carousell bot-blocks GitHub's IPs, so the CI scrape usually fails —
      # that's fine: we fall back to the committed carousell-listings.json
      # (refresh it locally: CDP_URL=http://127.0.0.1:9222 node scripts/carousell-scrape.mjs)
      - name: Try scraping Carousell profile (best effort)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.skip_scrape }}
        run: |
          # Try API scrape first (no browser needed, faster)
          node scripts/carousell-api-scrape.mjs && \
            node -e "const f=JSON.parse(require('fs').readFileSync('carousell-listings.json'));if(f.listings.length<10){process.exit(1)}" || \
          { echo "API scrape failed — trying browser scrape...";
            npm init -y >/dev/null
            npm install playwright playwright-extra puppeteer-extra-plugin-stealth --no-audit --no-fund
            npx playwright install --with-deps chromium
            node scripts/carousell-scrape.mjs; }
          # If still too few listings, restore committed file
          node -e "const f=JSON.parse(require('fs').readFileSync('carousell-listings.json'));if(f.listings.length<10){process.exit(1)}" || \
            { echo "Both scrape methods failed — restoring committed carousell-listings.json"; git checkout HEAD -- carousell-listings.json; }
          rm -f package.json package-lock.json 2>/dev/null || true
      - name: Match listings to sheet rows
        run: |
          if [ ! -s carousell-listings.json ]; then
            echo "No carousell-listings.json available — run the local scrape first"; exit 1
          fi
          node scripts/carousell-match.js
      - name: Sync matched URLs to Google Sheet
        run: |
          if [ ! -s carousell-matches.json ]; then
            echo "No carousell-matches.json — skipping sheet sync"; exit 0
          fi
          PAYLOAD=$(node -e "
            const m = JSON.parse(require('fs').readFileSync('carousell-matches.json','utf8'));
            console.log(JSON.stringify({ secret: '${{ secrets.APPS_SCRIPT_SECRET }}', matches: { games: m.games, codes: m.codes } }));
          ")
          RESPONSE=$(curl -s -L -X POST '${{ secrets.APPS_SCRIPT_URL }}' \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")
          echo "Apps Script response: $RESPONSE"
      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FILES="carousell-listings.json carousell-matches.json carousell-urls.csv carousell-urls-raw-data.tsv carousell-urls-digital-codes.tsv"
          mkdir -p /tmp/carousell && cp $FILES /tmp/carousell/ 2>/dev/null || true
          for i in 1 2 3; do
            git add $FILES 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "outputs unchanged"
              break
            fi
            git commit -m "Update Carousell URL matches"
            if git push; then break; fi
            echo "push rejected — resetting and retrying ($i/3)"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/carousell/* . 2>/dev/null || true
          done
