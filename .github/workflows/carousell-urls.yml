name: Build Carousell URLs

on:
  schedule:
    - cron: '30 18 * * *'   # daily 02:30 GMT+8
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['carousell-listings.json']   # rematch whenever fresh listings land

permissions:
  contents: write

concurrency:
  group: carousell
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Try scraping Carousell (best effort, falls back to committed JSON)
        run: |
          enough() { node -e "const f=JSON.parse(require('fs').readFileSync('carousell-listings.json'));process.exit(f.listings.length>=10?0:1)" 2>/dev/null; }

          # Try API scrape first (no browser needed)
          node scripts/carousell-api-scrape.mjs || true

          if enough; then
            echo "API scrape succeeded"
          else
            echo "API scrape insufficient — trying browser scrape..."
            npm init -y >/dev/null
            npm install playwright playwright-extra puppeteer-extra-plugin-stealth --no-audit --no-fund
            npx playwright install --with-deps chromium
            node scripts/carousell-scrape.mjs || true
            rm -f package.json package-lock.json 2>/dev/null || true
            if enough; then
              echo "Browser scrape succeeded"
            else
              echo "Scrape failed — falling back to committed carousell-listings.json"
              git checkout HEAD -- carousell-listings.json
            fi
          fi

      - name: Match listings to sheet rows
        run: node scripts/carousell-match.js

      - name: Sync matched URLs to Google Sheet
        run: |
          if [ ! -s carousell-matches.json ]; then
            echo "No carousell-matches.json — skipping sheet sync"; exit 0
          fi
          PAYLOAD=$(node -e "
            const m = JSON.parse(require('fs').readFileSync('carousell-matches.json','utf8'));
            console.log(JSON.stringify({ secret: '${{ secrets.APPS_SCRIPT_SECRET }}', matches: { games: m.games, codes: m.codes } }));
          ")
          # Strip any accidental whitespace from the URL secret
          SCRIPT_URL=$(echo '${{ secrets.APPS_SCRIPT_URL }}' | tr -d '[:space:]')
          echo "Posting to URL length: ${#SCRIPT_URL} chars"
          HTTP_CODE=$(curl -s -o /tmp/as_response.txt -w "%{http_code}" -L -X POST "$SCRIPT_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")
          echo "HTTP status: $HTTP_CODE"
          RESPONSE=$(cat /tmp/as_response.txt)
          # Print only first 500 chars to avoid flooding logs with HTML
          echo "Apps Script response (first 500 chars): ${RESPONSE:0:500}"
          # Check if it looks like JSON success
          echo "$RESPONSE" | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            try { const j=JSON.parse(d); console.log('Parsed JSON:', JSON.stringify(j)); }
            catch(e) { console.log('Response is not JSON — likely wrong URL or doPost missing'); }
          "

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FILES="carousell-listings.json carousell-matches.json carousell-urls.csv carousell-urls-raw-data.tsv carousell-urls-digital-codes.tsv"
          mkdir -p /tmp/carousell && cp $FILES /tmp/carousell/ 2>/dev/null || true
          for i in 1 2 3; do
            git add $FILES 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "outputs unchanged"
              break
            fi
            git commit -m "Update Carousell URL matches"
            if git push; then break; fi
            echo "push rejected — resetting and retrying ($i/3)"
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/carousell/* . 2>/dev/null || true
          done
